version: 1.3.5

cache: true

endpoints:
  custom:
    - name: "L5 AI"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"

      models:
        default:
          - "openai/gpt-4o-mini"
          - "anthropic/claude-3-haiku"

        fetch: true

      titleConvo: true
      titleModel: "current_model"

      summarize: false
      summaryModel: "current_model"

      modelDisplayLabel: "L5 Alpha"
